- name: "cluster:kernel"
  color: "1d76db"
  description: "OCCTSwift core geometry/meshing/IO libraries"
- name: "cluster:cad-intelligence"
  color: "1d76db"
  description: "NL->CAD, inspection, eval, models"
- name: "cluster:coreml"
  color: "1d76db"
  description: "CoreML model conversions feeding the CAD pipeline"
- name: "cluster:cam"
  color: "1d76db"
