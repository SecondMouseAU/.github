# --- type ---
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type:feature"
  color: "0e8a16"
  description: "New capability or enhancement"
- name: "type:epic"
  color: "5319e7"
  description: "Large effort tracked via sub-issues"
- name: "type:spike"
  color: "fbca04"
  description: "Time-boxed investigation"
- name: "type:chore"
  color: "c5def5"
  description: "Maintenance / tooling"
- name: "type:docs"
  color: "006b75"
  description: "Documentation / OKF catalog"

# --- priority ---
- name: "priority:P0"
  color: "b60205"
  description: "Drop everything"
- name: "priority:P1"
  color: "d93f0b"
  description: "High"
- name: "priority:P2"
  color: "fbca04"
  description: "Normal"
- name: "priority:P3"
  color: "0e8a16"
  description: "Low / someday"

# --- status ---
- name: "status:triage"
  color: "ededed"
  description: "Needs triage"
- name: "status:blocked"
  color: "e11d21"
